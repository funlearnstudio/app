<script>

// =========================================
// 1. 全域設定與常數 (必須放在最上面)
// =========================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";

// =========================================
// 🚀 特權解鎖清單設定 (12 階級完整版)
// =========================================
const featuresList = [
    { xp: 100, name: "潛力新秀面板", icon: "fa-seedling", desc: "解鎖清新淺綠色磨砂背景" },
    { xp: 300, name: "勤奮書生面板", icon: "fa-book-open", desc: "解鎖溫暖橘色玻璃背景" },
    { xp: 1000, name: "白銀騎士面板", icon: "fa-shield-alt", desc: "解鎖冷冽金屬銀色主題" },
    { xp: 2500, name: "黃金菁英面板", icon: "fa-trophy", desc: "解鎖尊貴閃耀黃金主題" },
    { xp: 5000, name: "頂尖學者面板", icon: "fa-gem", desc: "解鎖鑽石藍尊榮主題" },
    { xp: 10000, name: "聖域大師面板", icon: "fa-fire", desc: "解鎖熱血紅色專屬主題" },
    { xp: 15000, name: "榮耀宗師面板", icon: "fa-chess-king", desc: "解鎖尊貴紫紅大師主題" },
    { xp: 20000, name: "傳奇領主面板", icon: "fa-crown", desc: "解鎖華麗深棕紅傳奇主題" },
    { xp: 30000, name: "史詩英雄面板", icon: "fa-dragon", desc: "解鎖極光夜空史詩主題" },
    { xp: 50000, name: "萬古神話流星", icon: "fa-meteor", desc: "解鎖深邃宇宙黑與專屬流星雨" },
    { xp: 100000, name: "創世星神領域", icon: "fa-sun", desc: "解鎖終極黑洞特效與加倍流星雨" }
];

// =========================================
// 2. 核心引擎 (主題變色 & 音效)
// =========================================
const ThemeEngine = {
    apply: function(xp) {
        console.log("當前頁面主題判定中... XP:", xp);
        const body = document.body;
        
        body.classList.remove(
            'theme-novice', 'theme-rookie', 'theme-bronze', 'theme-silver', 
            'theme-gold', 'theme-diamond', 'theme-master', 'theme-grandmaster', 
            'theme-legend', 'theme-epic', 'theme-mythic', 'theme-celestial'
        );

        if (xp >= 100000) { body.classList.add('theme-celestial'); this.createStars(15); } 
        else if (xp >= 50000) { body.classList.add('theme-mythic'); this.createStars(8); } 
        else if (xp >= 30000) body.classList.add('theme-epic');         
        else if (xp >= 20000) body.classList.add('theme-legend');       
        else if (xp >= 15000) body.classList.add('theme-grandmaster');  
        else if (xp >= 10000) body.classList.add('theme-master');       
        else if (xp >= 5000)  body.classList.add('theme-diamond');      
        else if (xp >= 2500)  body.classList.add('theme-gold');         
        else if (xp >= 1000)  body.classList.add('theme-silver');       
        else if (xp >= 300)   body.classList.add('theme-bronze');       
        else if (xp >= 100)   body.classList.add('theme-rookie');       
        else                  body.classList.add('theme-novice');       
    },
    createStars: function(starCount) {
        const container = document.getElementById('star-container');
        if (!container || container.hasChildNodes()) return; 
        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; 
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};

const SoundEngine = {
    bgm: new Audio('https://actions.google.com/sounds/v1/ambiences/arcade_game_hall.ogg'),
    gachaPull: new Audio('https://actions.google.com/sounds/v1/cartoon/magic_chime_scifi.ogg'),
    gachaWin: new Audio('https://actions.google.com/sounds/v1/cartoon/cartoon_success_fanfare.ogg'),
    gachaFail: new Audio('https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg'),

    init: function() {
        this.bgm.loop = true; 
        this.bgm.volume = 0.2; 
        this.gachaPull.volume = 0.6;
        this.gachaWin.volume = 0.8;
        this.gachaFail.volume = 0.8;
    },
    playBGM: function() {
        let playPromise = this.bgm.play();
        if (playPromise !== undefined) {
            playPromise.catch(error => console.log("等待使用者點擊後播放 BGM"));
        }
    },
    playSound: function(type) {
        if (this[type]) {
            this[type].currentTime = 0;
            this[type].play().catch(e => console.log("音效播放失敗"));
        }
    }
};

// =========================================
// 3. UI 操作與抽獎功能
// =========================================
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (sidebar.classList.contains('-translate-x-full')) {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    } else {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }
}

function openProfileModal() {
    const user = Auth.getCurrentUser();
    if (!user || user.username === 'guest') {
        alert("訪客無法修改年級，請先登入！");
        return;
    }
    const select = document.getElementById('editGradeSelect');
    if (user.grade) select.value = user.grade;
    document.getElementById('profileModal').classList.remove('hidden');
}

function closeProfileModal() {
    document.getElementById('profileModal').classList.add('hidden');
}

async function saveProfile() {
    const user = Auth.getCurrentUser();
    const newGrade = document.getElementById('editGradeSelect').value;
    try {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "update_grade", account: user.username, newGrade: newGrade })
        });
        const result = await response.json();
        if (result.status === "success") {
            user.grade = newGrade;
            localStorage.setItem('currentUser', JSON.stringify(user));
            alert("年級修改成功！");
            location.reload(); 
        } else {
            alert("修改失敗：" + result.message);
        }
    } catch (e) {
        alert("連線異常，請稍後再試");
    }
}

function updateTicketUI() {
    let user = Auth.getCurrentUser();
    if (user) {
        const ticketEl = document.getElementById('ticketCount');
        if (ticketEl) ticketEl.textContent = user.gachaTickets || 0;
    }
}

function playGacha() {
    let user = Auth.getCurrentUser();
    let tickets = user.gachaTickets || 0;

    if (tickets <= 0) {
        alert("😢 抽獎券不足！再去多寫幾份考卷吧！");
        return;
    }

    Auth.updateUser('gachaTickets', tickets - 1);
    updateTicketUI();

    SoundEngine.playSound('gachaPull');
    const btn = document.getElementById('drawGachaBtn');
    const resultDiv = document.getElementById('gachaResult');
    
    btn.disabled = true;
    btn.innerText = "✨ 轉動中...";
    btn.classList.add('opacity-70');
    resultDiv.classList.add('hidden');
setTimeout(() => {
        btn.disabled = false;
        btn.innerText = "消耗 1 張抽獎券";
        btn.classList.remove('opacity-70');
        resultDiv.classList.remove('hidden');

        const rand = Math.random() * 100;
        let gainedXP = 0;
        let message = "";
        let msgClass = "";

        if (rand < 8) {
            SoundEngine.playSound('gachaWin');
            message = "✨ 神話級獎勵：獲得 1000 XP！✨";
            msgClass = "mt-4 text-xl font-bold text-yellow-300 animate-bounce";
            gainedXP = 1000;
        } else if (rand < 45) {
            SoundEngine.playSound('gachaWin');
            message = "🎉 稀有獎勵：獲得 200 XP！";
            msgClass = "mt-4 text-lg font-bold text-white animate-pulse";
            gainedXP = 200;
        } else {
            SoundEngine.playSound('gachaFail');
            message = "💨 銘謝惠顧！獲得 50 XP 安慰獎。";
            msgClass = "mt-4 text-lg text-slate-300";
            gainedXP = 50;
        }

        resultDiv.innerHTML = message;
        resultDiv.className = msgClass;

        // 1. 更新本機端 XP
        Auth.updateUser('xp', (user.xp || 0) + gainedXP);
        
        // 2. 重新判定畫面主題
        ThemeEngine.apply(Auth.getCurrentUser().xp);

        // 👇👇👇 🌟 關鍵修復：將抽獎獲得的 XP 傳送給雲端 (Google Sheets) 👇👇👇

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "save_record",
                username: user.username,
                activity: "幸運抽獎", // 把抽獎當成一種活動紀錄傳給雲端
                score: 0,
                xp: gainedXP,       // 告訴雲端要加多少經驗值
                detail: JSON.stringify({ note: "抽獎機獲得" })
            })
        }).then(() => {
            console.log(`✅ 抽獎獲得的 ${gainedXP} XP 已成功同步至雲端！`);
        }).catch(e => {
            console.error("❌ 抽獎 XP 雲端同步失敗", e);
        });
        // 👆👆👆 關鍵修復結束 👆👆👆

    }, 2000);
}

function renderUnlockedFeatures(userXp) {
    const listContainer = document.getElementById('unlockedFeaturesList');
    if (!listContainer) return;
    listContainer.innerHTML = ''; 

    featuresList.forEach(feature => {
        const isUnlocked = userXp >= feature.xp; 
        const li = document.createElement('li');
        li.className = `p-3 rounded-2xl border ${isUnlocked ? 'bg-indigo-50 border-indigo-100' : 'bg-slate-50 border-slate-100 opacity-60'} flex items-center justify-between transition-all duration-300`;
        li.innerHTML = `
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center ${isUnlocked ? 'bg-indigo-500 text-white shadow-md' : 'bg-slate-200 text-slate-400'}">
                    <i class="fas ${feature.icon}"></i>
                </div>
                <div>
                    <div class="font-bold ${isUnlocked ? 'text-slate-800' : 'text-slate-500'}">${feature.name}</div>
                    <div class="text-[11px] ${isUnlocked ? 'text-indigo-600' : 'text-slate-400'}">${feature.desc}</div>
                </div>
            </div>
            <div class="text-right">
                ${isUnlocked 
                    ? '<i class="fas fa-unlock-alt text-emerald-500 text-lg drop-shadow-sm"></i>' 
                    : `<div class="text-[10px] font-black text-slate-400"><i class="fas fa-lock"></i> 需 ${feature.xp} XP</div>`
                }
            </div>
        `;
        listContainer.appendChild(li);
    });
}

function getRankInfo(xp) {
    if (xp >= 100000) return { title: "🌌 創世星神", bg: "bg-slate-950", badge: "bg-gradient-to-r from-yellow-300 via-yellow-500 to-amber-600 text-black shadow-[0_0_15px_rgba(253,224,71,0.6)] animate-pulse font-black", text: "text-yellow-400 drop-shadow-md" };
    if (xp >= 50000) return { title: "✨ 萬古神話", bg: "bg-slate-900", badge: "bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white animate-pulse shadow-lg", text: "text-white" };
    if (xp >= 30000) return { title: "🌠 史詩英雄", bg: "bg-emerald-950", badge: "bg-emerald-500 text-emerald-950 font-bold shadow-md", text: "text-emerald-100" };
    if (xp >= 20000) return { title: "👑 傳奇領主", bg: "bg-amber-900", badge: "bg-yellow-400 text-amber-900 shadow-lg font-bold", text: "text-amber-50" };
    if (xp >= 15000) return { title: "🔱 榮耀宗師", bg: "bg-fuchsia-900", badge: "bg-fuchsia-200 text-fuchsia-900 font-bold", text: "text-fuchsia-50" };
    if (xp >= 10000) return { title: "🔥 聖域大師", bg: "bg-red-700", badge: "bg-white text-red-700 font-bold shadow", text: "text-red-50" };
    if (xp >= 5000) return { title: "💎 頂尖學者", bg: "bg-blue-600", badge: "bg-blue-100 text-blue-800 font-bold", text: "text-white" };
    if (xp >= 2500) return { title: "🏆 黃金菁英", bg: "bg-yellow-500", badge: "bg-yellow-100 text-yellow-800 font-bold", text: "text-white" };
    if (xp >= 1000) return { title: "⚔️ 白銀騎士", bg: "bg-slate-300", badge: "bg-slate-600 text-white font-bold", text: "text-slate-800 font-bold" };
    if (xp >= 300) return { title: "📖 勤奮書生", bg: "bg-orange-100", badge: "bg-orange-500 text-white", text: "text-orange-900" };
    if (xp >= 100) return { title: "🌱 潛力新秀", bg: "bg-green-50", badge: "bg-green-500 text-white", text: "text-green-900" };
    return { title: "🥚 初心學徒", bg: "bg-slate-50", badge: "bg-slate-200 text-slate-500", text: "text-slate-700" };
}

// =========================================
// 4. API 呼叫 (讀取個人資料與排行榜)
// =========================================
async function initProfile() {
    let user = Auth.getCurrentUser();
    if (!user || user.username === 'guest') {
        const playerNameEl = document.getElementById('playerName');
        if (playerNameEl) playerNameEl.textContent = "訪客";
        return;
    }

    document.getElementById('sideUserName').textContent = user.name || user.username;
    document.getElementById('playerName').textContent = user.name || user.username;

    let currentXP = user.xp || 0; 

    try {
        const response = await fetch(`${GAS_URL}?action=get_leaderboard&t=${new Date().getTime()}`);
        const topPlayers = await response.json();
        const me = topPlayers.find(p => p.username === user.username);

        if (me) {
            currentXP = Number(me.xp) || 0;
            const level = Number(me.level) || 1;
            document.getElementById('playerLevel').textContent = `Lv. ${level}`;
            
            const xpInThisLevel = currentXP % 100; 
            const xpNeeded = 100 - xpInThisLevel;
            
            document.getElementById('xpText').textContent = `${currentXP} XP (總計)`;
            document.getElementById('xpNeeded').textContent = xpNeeded;
            
            setTimeout(() => {
                const xpFill = document.getElementById('xpFill');
                if (xpFill) xpFill.style.width = `${Math.max((xpInThisLevel / 100) * 100, 2)}%`;
            }, 500);
            
            renderUnlockedFeatures(currentXP);
        }
    } catch (error) {
        console.error("XP 同步失敗:", error);
    } finally {
        // ✅ 修正點：使用新的主題引擎！
        ThemeEngine.apply(currentXP); 
    }
}

async function loadLeaderboard() {
    const listContainer = document.getElementById('leaderboardList');
    const loadingMsg = document.getElementById('loadingMsg');

    try {
        const response = await fetch(`${GAS_URL}?action=get_leaderboard`);
        const topPlayers = await response.json();
        
        loadingMsg.style.display = 'none'; 
        listContainer.innerHTML = ""; 

        if (!topPlayers || topPlayers.length === 0 || topPlayers.error) {
            listContainer.innerHTML = "<li class='text-center py-10 text-slate-400 font-medium bg-slate-50 rounded-2xl'>目前尚無排名紀錄</li>";
            return;
        }

        topPlayers.forEach((player, index) => {
            const li = document.createElement('li');
            const rank = getRankInfo(player.xp); 

            li.className = `flex items-center justify-between p-4 ${rank.bg} ${rank.text} hover:scale-[1.02] border border-transparent rounded-2xl transition-all duration-300 mb-3 shadow-sm`;
            
            let rankDisplay = `<span class="font-bold text-xl">${index + 1}</span>`;
            if (index === 0) rankDisplay = '<i class="fas fa-crown text-3xl text-yellow-400"></i>';
            else if (index === 1) rankDisplay = '<i class="fas fa-medal text-3xl text-slate-300"></i>';
            else if (index === 2) rankDisplay = '<i class="fas fa-award text-3xl text-amber-500"></i>';

            li.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-12 text-center">${rankDisplay}</div>
                    <div>
                        <div class="font-extrabold text-lg flex items-center gap-2">
                            ${player.name || player.username}
                        </div>
                        <div class="text-[11px] font-black px-3 py-0.5 rounded-full inline-block mt-1 ${rank.badge}">
                            ${rank.title}
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="font-black text-2xl">
                        ${player.xp.toLocaleString()} <span class="text-[10px] opacity-70">XP</span>
                    </div>
                </div>
            `;
            listContainer.appendChild(li);
        });
    } catch (error) {
        loadingMsg.innerHTML = "<span class='text-red-500 font-bold'>伺服器連線失敗</span>";
    }
}

// =========================================
// 5. 網頁載入時啟動所有功能
// =========================================
document.addEventListener('DOMContentLoaded', () => {
    // 初始化音效與票券 UI
    SoundEngine.init();
    updateTicketUI();
    
    // 初始化個人資料與排行榜
    initProfile();
    loadLeaderboard();

    // ✅ 修正點：使用新的主題引擎，取代舊的 applyGlobalTheme
    const currentUser = (window.Auth && Auth.getCurrentUser()) || JSON.parse(localStorage.getItem('currentUser') || '{}');
    if (currentUser && currentUser.xp !== undefined) {
        ThemeEngine.apply(currentUser.xp);
    }
    
    // 點擊網頁任何地方啟動背景音樂 (自動解除監聽避免重複)
    document.body.addEventListener('click', function startBGM() {
        SoundEngine.playBGM();
        document.body.removeEventListener('click', startBGM);
    }, { once: true });
});
