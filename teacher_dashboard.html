<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師管理系統  - 雲端學院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="1-1ce8683e.ico"> 
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex">

    <aside class="w-64 min-h-screen bg-slate-900 text-white p-6 sticky top-0">
        <div class="flex items-center mb-10">
            <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center mr-3">
                <i class="fas fa-graduation-cap text-xl"></i>
            </div>
            <span class="text-xl font-bold tracking-wider">教師管理中心</span>
        </div>
        
        <nav class="space-y-2">
            <a href="#" class="flex items-center space-x-3 p-3 bg-blue-600 rounded-xl">
                <i class="fas fa-users w-5"></i><span>學生名單</span>
            </a>
            <a href="dashboard.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl text-slate-400 transition">
                <i class="fas fa-arrow-left w-5"></i><span>回學生主頁</span>
            </a>
            <button onclick="logout()" class="w-full flex items-center space-x-3 p-3 hover:bg-red-900/30 text-red-400 rounded-xl transition mt-10">
                <i class="fas fa-sign-out-alt w-5"></i><span>登出系統</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <header class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">學生學習概況</h1>
                <p class="text-slate-500 mt-2">即時追蹤學生的測驗數據與錯題分佈</p>
            </div>
            <div class="flex space-x-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                    <input type="text" id="studentSearch" onkeyup="filterStudents()" placeholder="搜尋姓名或帳號..." 
                           class="pl-10 pr-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none w-64 shadow-sm">
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10" id="statsCards">
            </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 text-slate-600 text-sm uppercase">
                    <tr>
                        <th class="p-5 font-bold">學生姓名</th>
                        <th class="p-5 font-bold">班級/年級</th>
                        <th class="p-5 font-bold">平均分數</th>
                        <th class="p-5 font-bold">總測驗次數</th>
                        <th class="p-5 font-bold text-center">操作</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="detailModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[80vh] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h3 class="text-xl font-bold text-slate-800" id="modalTitle">學生詳細記錄</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto" id="modalContent">
                </div>
        </div>
    </div>

    <script>
        const GAS_URL = "你的_GAS_部署網址"; // ⚠️ 請更換成你的 GAS 網址
        let allStudents = [];

        async function init() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user || user.role !== 'teacher') {
                alert('權限不足，請以教師帳號登入');
                window.location.href = 'index.html';
                return;
            }
            fetchRoster();
        }

        async function fetchRoster() {
            const table = document.getElementById('studentTableBody');
            table.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i>資料同步中...</td></tr>';
            
            try {
                const response = await fetch(`${GAS_URL}?action=get_roster`);
                allStudents = await response.json();
                renderTable(allStudents);
                updateStats(allStudents);
            } catch (err) {
                table.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-500">讀取失敗，請確認 GAS 權限已設為「所有人」。</td></tr>';
            }
        }

        function renderTable(data) {
            const table = document.getElementById('studentTableBody');
            table.innerHTML = data.map(s => {
                let statusClass = s.avgScore >= 80 ? 'text-green-600 bg-green-50' : (s.avgScore < 60 ? 'text-red-600 bg-red-50' : 'text-blue-600 bg-blue-50');
                return `
                <tr class="hover:bg-slate-50 transition group">
                    <td class="p-5 font-bold text-slate-700">${s.name} <span class="text-xs font-normal text-slate-400">(${s.username})</span></td>
                    <td class="p-5 text-slate-600">${s.grade}</td>
                    <td class="p-5">
                        <span class="px-3 py-1 rounded-full text-sm font-bold ${statusClass}">${s.avgScore} 分</span>
                    </td>
                    <td class="p-5 font-medium text-slate-500">${s.testCount} 次</td>
                    <td class="p-5 text-center">
                        <button onclick="viewStudentDetail('${s.username}', '${s.name}')" 
                                class="bg-white border border-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-900 hover:text-white transition shadow-sm">
                            查看分析
                        </button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        function filterStudents() {
            const q = document.getElementById('studentSearch').value.toLowerCase();
            const filtered = allStudents.filter(s => s.name.toLowerCase().includes(q) || s.username.toLowerCase().includes(q));
            renderTable(filtered);
        }

        async function viewStudentDetail(username, name) {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            document.getElementById('modalTitle').innerText = `${name} 的測驗紀錄與錯題`;
            modal.classList.remove('hidden');
            content.innerHTML = '<div class="text-center p-10"><i class="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i></div>';

            try {
                // 抓取該學生的詳細記錄
                const response = await fetch(`${GAS_URL}?username=${username}`);
                const records = await response.json();

                if (records.length === 0) {
                    content.innerHTML = '<p class="text-center text-slate-400">目前尚無詳細紀錄</p>';
                } else {
                    content.innerHTML = records.map(r => `
                        <div class="mb-6 p-4 border rounded-2xl bg-slate-50">
                            <div class="flex justify-between items-center mb-3">
                                <span class="font-bold text-slate-800 text-lg">${r.title}</span>
                                <span class="text-sm font-bold px-2 py-1 bg-white border rounded-lg text-blue-600">${r.score}分</span>
                            </div>
                            <div class="text-xs text-slate-400 mb-3">${r.date}</div>
                            ${r.wrongList.length > 0 ? `
                                <div class="space-y-2">
                                    <p class="text-sm font-bold text-red-500"><i class="fas fa-exclamation-triangle mr-1"></i>錯題：</p>
                                    <ul class="text-sm space-y-1">
                                        ${r.wrongList.map(w => `<li class="p-2 bg-white rounded-lg border-l-4 border-red-300">Q: ${w.q}</li>`).join('')}
                                    </ul>
                                </div>
                            ` : '<p class="text-sm text-green-600 font-bold"><i class="fas fa-check-circle mr-1"></i>全對！</p>'}
                        </div>
                    `).join('');
                }
            } catch (err) {
                content.innerHTML = '<p class="text-red-500 text-center">抓取詳細資料失敗。</p>';
            }
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }

        init();
    </script>
</body>
</html>
