name: 自動混淆程式碼並發布網站

on:
  push:
    branches:
      - main  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 下載你的正常程式碼
        uses: actions/checkout@v3

      - name: 設定 Node.js 環境
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 🌟 執行代碼混淆魔法 (把正常代碼變天書)
        # npx 會自動下載混淆套件，並覆蓋原本的檔案 (只有在機器人體內覆蓋，不會影響你的原始碼)
        run: |
          npx javascript-obfuscator ./mockdata --output ./mockdata --compact true --string-array true --string-array-encoding 'base64'
          npx javascript-obfuscator ./assets/js --output ./assets/js --compact true --string-array true --string-array-encoding 'base64'

      - name: 將變身後的網站發布到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
