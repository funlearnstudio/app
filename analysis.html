<script>
// ==========================================
// 1. 全域設定與 ThemeEngine
// ==========================================
let allQuestionsData = [];
const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec"; 

const ThemeEngine = {
    apply: async function(username) {
        console.log("🚀 [ThemeEngine] 啟動快照優先模式。用戶:", username);

        let userRaw = localStorage.getItem('currentUser');
        let userDataLocal = userRaw ? JSON.parse(userRaw) : { xp: 0 };
        let currentXP = Number(userDataLocal.xp) || 0;
        
        this.updateThemeUI(currentXP); 

        try {
            const response = await fetch(`${GAS_URL}?action=get_leaderboard`);
            const leaderboard = await response.json();
            
            const cloudUser = leaderboard.find(u => 
                String(u.username).trim().toLowerCase() === String(username).trim().toLowerCase()
            );

            if (cloudUser) {
                const cloudXP = Number(cloudUser.xp);
                if (cloudXP !== currentXP) {
                    console.log("✨ [同步] 偵測到數值差異，更新 UI...");
                    userDataLocal.xp = cloudXP;
                    if (cloudUser.level) userDataLocal.level = cloudUser.level;
                    localStorage.setItem('currentUser', JSON.stringify(userDataLocal));
                    this.updateThemeUI(cloudXP); 
                }
            }
        } catch (e) {
            console.error("❌ 雲端同步失敗:", e);
        }
    },

    updateThemeUI: function(xp) {
        const body = document.body;
        const level = Math.floor(xp / 100) + 1;

        let selected = 'theme-novice';
        let title = "初級學徒";

        if (xp >= 100000) { selected = 'theme-celestial'; title = "🌌 天神"; }
        else if (xp >= 50000) { selected = 'theme-mythic'; title = "🌀 神話"; }
        else if (xp >= 30000) { selected = 'theme-epic'; title = "⚡ 史詩"; }
        else if (xp >= 20000) { selected = 'theme-legend'; title = "📜 傳說"; }
        else if (xp >= 15000) { selected = 'theme-grandmaster'; title = "👑 大師"; }
        else if (xp >= 10000) { selected = 'theme-master'; title = "🔥 宗師"; }
        else if (xp >= 5000)  { selected = 'theme-diamond'; title = "💎 鑽石"; }
        else if (xp >= 2500)  { selected = 'theme-gold'; title = "🏆 黃金"; }
        else if (xp >= 1000)  { selected = 'theme-silver'; title = "🌟 白銀"; }
        else if (xp >= 300)   { selected = 'theme-bronze'; title = "📖 青銅"; }
        else if (xp >= 100)   { selected = 'theme-rookie'; title = "🔰 菜鳥"; }

        const themes = [
            'theme-novice', 'theme-rookie', 'theme-bronze', 'theme-silver', 
            'theme-gold', 'theme-diamond', 'theme-master', 'theme-grandmaster', 
            'theme-legend', 'theme-epic', 'theme-mythic', 'theme-celestial'
        ];
        body.classList.remove(...themes);
        body.classList.add(selected);

        // 更新 UI 文字
        if (document.getElementById('userTitleDisplay')) {
            document.getElementById('userTitleDisplay').innerText = title;
        }
        if (document.getElementById('headerLevel')) {
            document.getElementById('headerLevel').innerText = `Lv.${level}`;
        }
        
        if (xp >= 50000) this.createStars(xp >= 100000 ? 15 : 8);
    },

    createStars: function(starCount) {
        let container = document.getElementById('star-container');
        if (!container) {
            container = document.createElement('div');
            container.id = 'star-container';
            document.body.appendChild(container);
        }
        container.innerHTML = ''; 
        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; 
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};

// ==========================================
// 2. 初始化與載入
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
    try {
        if (typeof Auth === 'undefined') return;
        const user = Auth.getCurrentUser();
        if (!user) {
            alert("⚠️ 您尚未登入，請先進行登入！");
            window.location.href = 'index.html'; 
            return;
        }
        initUserInterface(user);
        loadExamResult(user);
    } catch (e) {
        console.error("系統初始化失敗:", e);
    }
});

function initUserInterface(user) {
    ThemeEngine.apply(user.username);

    const nameEl = document.getElementById('sideUserName');
    const roleEl = document.getElementById('sideUserRole');
    if (nameEl) nameEl.textContent = user.name;
    if (roleEl) roleEl.textContent = user.grade || "學生";
    
    const select = document.getElementById('editGradeSelect');
    if (select && user.grade) select.value = user.grade;

    if (localStorage.getItem(`hasUpdatedGrade_${user.username}`)) {
        const editBtn = document.querySelector('button[onclick="openProfileModal()"]');
        if (editBtn) editBtn.style.display = 'none';
    }
}

async function loadExamResult(user) {
    const reportContent = document.getElementById('reportContent');
    const noDataMessage = document.getElementById('noDataMessage');

    try {
        const response = await fetch(`${GAS_URL}?username=${encodeURIComponent(user.username)}&t=${Date.now()}`);
        if (!response.ok) throw new Error("網路請求失敗");

        const rawData = await response.json();
        
        let history = Array.isArray(rawData) ? rawData : [];
        // 過濾遊戲與抽獎
        history = history.filter(item => {
            const t = String(item.title || "");
            return !t.includes("遊戲") && !t.includes("抽獎") && !t.includes("Game");
        });

        if (history.length === 0) {
            reportContent?.classList.add('hidden');
            noDataMessage?.classList.remove('hidden');
            return;
        }

        const lastResult = history[0]; 
        
        allQuestionsData = lastResult.questions && lastResult.questions.length > 0 
            ? lastResult.questions 
            : (lastResult.wrongList || []);

        updateScoreBoard(lastResult);
        updateCheatAnalysis(lastResult); // 🌟 呼叫行為分析渲染
        
        if (typeof renderRadarChart === "function") {
            renderRadarChart(lastResult.score, lastResult.wrongList || []);
        }

        updateFilterCounts();
        renderQuestionList(allQuestionsData);
        
        reportContent?.classList.remove('hidden');
        noDataMessage?.classList.add('hidden');

    } catch (e) {
        console.error("雲端載入失敗:", e);
        const localData = localStorage.getItem('examResult');
        if (localData) {
            const result = JSON.parse(localData);
            allQuestionsData = result.questions || result.wrongList || [];
            updateScoreBoard(result);
            updateCheatAnalysis(result); // 🌟 本地備援也呼叫行為分析
            renderQuestionList(allQuestionsData);
            reportContent?.classList.remove('hidden');
            noDataMessage?.classList.add('hidden');
        }
    }
}

// ==========================================
// 3. UI 數據與圖表渲染
// ==========================================
function updateScoreBoard(result) {
    document.getElementById('scoreDisplay').textContent = result.score || 0;
    
    let total = result.totalCount || allQuestionsData.length;
    let correct = result.correctCount || allQuestionsData.filter(q => q.answer == q.yourAns).length;
    
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('totalCount').textContent = total;
    
    const subject = result.subject || '單元測驗';
    const date = result.date || new Date().toLocaleDateString();
    
    const el = document.getElementById('examMetaInfo');
    if (el) el.textContent = `${subject} | ${date}`;
}

// 🌟 新增：渲染考試行為分析 (切換分頁與作答節奏)
function updateCheatAnalysis(result) {
    const section = document.getElementById('cheatAnalysisSection');
    const timeBox = document.getElementById('timeCheatText');
    const tabBox = document.getElementById('tabCheatText');
    
    // 檢查是否有相關數據，若無則隱藏區塊
    if (result.tabSwitches === undefined && !result.cheat) {
        section.classList.add('hidden');
        return;
    }

    section.classList.remove('hidden');

    // 1. 切換分頁分析
    if (result.tabSwitches !== undefined) {
        if (result.tabSwitches === 0) {
            tabBox.innerHTML = '<span class="text-green-600 font-bold"><i class="fas fa-check-circle"></i> 專注度極高，未切換分頁</span>';
        } else {
            tabBox.innerHTML = `<span class="text-red-500 font-bold"><i class="fas fa-exclamation-triangle"></i> 測驗期間切換分頁 ${result.tabSwitches} 次</span>`;
        }
    } else {
        tabBox.innerHTML = '<span class="text-gray-400">無數據</span>';
    }

    // 2. 作答節奏分析
    if (result.cheat) {
        if (result.cheat === true || String(result.cheat).includes("異常") || String(result.cheat).includes("過快")) {
            timeBox.innerHTML = `<span class="text-red-500 font-bold"><i class="fas fa-bolt"></i> 偵測到作答節奏異常 (過快)</span>`;
        } else {
            timeBox.innerHTML = `<span class="text-orange-500 font-bold">${result.cheat}</span>`;
        }
    } else {
        timeBox.innerHTML = '<span class="text-green-600 font-bold"><i class="fas fa-check-circle"></i> 作答節奏正常，無異常快轉</span>';
    }
}

function updateFilterCounts() {
    const correctCount = allQuestionsData.filter(q => q.answer == q.yourAns).length;
    const wrongCount = allQuestionsData.filter(q => q.answer != q.yourAns).length;
    
    if(document.getElementById('countAll')) document.getElementById('countAll').innerText = allQuestionsData.length;
    if(document.getElementById('countCorrect')) document.getElementById('countCorrect').innerText = correctCount;
    if(document.getElementById('countWrong')) document.getElementById('countWrong').innerText = wrongCount;
}

function changeFilter(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
        b.classList.add('text-slate-500');
    });
    btn.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
    btn.classList.remove('text-slate-500');

    let filteredData = [];
    if (type === 'all') filteredData = allQuestionsData;
    else if (type === 'correct') filteredData = allQuestionsData.filter(q => q.answer == q.yourAns);
    else if (type === 'wrong') filteredData = allQuestionsData.filter(q => q.answer != q.yourAns);

    renderQuestionList(filteredData);
}

function renderRadarChart(baseScore = 0, wrongList = []) {
    const canvas = document.getElementById('radarChart');
    if (!canvas) return;
    
    if (window.myRadarChart) window.myRadarChart.destroy();

    const ctx = canvas.getContext('2d');
    const labels = ["觀念理解", "邏輯推演", "運算能力", "圖表分析", "素養應用"];
    let chartData = labels.map(() => Math.min(100, Math.max(40, baseScore + 20)));

    wrongList.forEach(q => {
        const concept = q.concept || "";
        labels.forEach((label, index) => {
            if (concept.indexOf(label) > -1) {
                chartData[index] = Math.max(20, chartData[index] - 15);
            }
        });
    });

    window.myRadarChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: labels,
            datasets: [{
                label: '能力分佈',
                data: chartData,
                backgroundColor: 'rgba(37, 99, 235, 0.2)',
                borderColor: '#2563eb',
                pointBackgroundColor: '#2563eb',
                pointHoverBorderColor: '#2563eb',
                borderWidth: 2
            }]
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            scales: { r: { min: 0, max: 100, ticks: { display: false, stepSize: 20 } } },
            plugins: { legend: { display: false } } 
        }
    });
}

function renderQuestionList(list) {
    const listContainer = document.getElementById('wrongList');
    if (!listContainer) return;

    if (!list || !Array.isArray(list) || list.length === 0) {
        listContainer.innerHTML = `
            <div class="py-16 text-center text-slate-400 bg-white rounded-2xl border border-dashed border-slate-300">
                <i class="fas fa-inbox text-4xl mb-3 block opacity-20"></i>
                <p class="font-bold">目前沒有題目資料</p>
            </div>`;
        return;
    }

    let fullHtml = '';
    list.forEach((q, idx) => {
        const isCorrect = (q.answer == q.yourAns); 
        let explainText = q.explanation ? (Array.isArray(q.explanation) ? q.explanation.join('<br>') : q.explanation) : "暫無詳細解析";
        let optionsHtml = '';

        if (q.options && Array.isArray(q.options)) {
            q.options.forEach((opt, optIdx) => {
                let styleClass = "bg-white border-gray-200 text-gray-600"; 
                let iconHtml = `<div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">${String.fromCharCode(65+optIdx)}</div>`;
                let statusHtml = "";

                if (optIdx == q.answer) {
                    styleClass = "bg-green-50 border-green-300 text-green-800";
                    statusHtml = `<span class="text-green-600 text-xs font-bold ml-2">正確解答</span>`;
                } else if (optIdx == q.yourAns && !isCorrect) {
                    styleClass = "bg-red-50 border-red-300 text-red-800";
                    statusHtml = `<span class="text-red-500 text-xs font-bold ml-2">你的答案</span>`;
                }

                optionsHtml += `<div class="p-3 border rounded-lg flex items-center gap-3 ${styleClass}">${iconHtml} <span>${opt}</span> ${statusHtml}</div>`;
            });
        }

        fullHtml += `
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition">
                <h3 class="font-bold mb-3 text-lg flex items-center gap-2">
                    <span class="bg-gray-800 text-white w-7 h-7 flex items-center justify-center rounded-md text-sm">${idx+1}</span>
                    ${isCorrect ? '<span class="text-green-500"><i class="fas fa-check-circle"></i> 答對</span>' : '<span class="text-red-500"><i class="fas fa-times-circle"></i> 答錯</span>'}
                </h3>
                <div class="mb-4 text-gray-800 leading-relaxed">${q.question || q.q || '（題目讀取失敗）'}</div>
                <div class="space-y-2">${optionsHtml}</div>
                <div class="mt-4 text-sm text-gray-600 bg-blue-50/50 p-4 rounded-lg border border-blue-100 border-l-4 border-l-blue-500">
                    <strong class="text-blue-700 block mb-1"><i class="fas fa-lightbulb"></i> 解析：</strong>
                    ${explainText}
                </div>
            </div>
        `;
    });

    listContainer.innerHTML = fullHtml;
    if (window.MathJax) MathJax.typesetPromise([listContainer]);
}

// ==========================================
// 4. 雲端同步與其他功能
// ==========================================
let isSyncing = false;
let hasSaved = false; 

function saveToCloud() {
    const btn = document.getElementById('btnSave');
    if (isSyncing || hasSaved) return;

    const user = Auth.getCurrentUser();
    if (!user || user.username === 'guest') return;

    const resultStr = localStorage.getItem('examResult');
    if (!resultStr) return;
    const examResult = JSON.parse(resultStr);

    if (examResult.isSaved) return markButtonAsSaved();

    isSyncing = true;
    if (btn) {
        btn.disabled = true; 
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步中...';
        btn.classList.add('opacity-75', 'cursor-not-allowed');
    }

    const recordData = {
        action: "save_record",
        username: user.username,
        activity: examResult.title || "單元測驗",
        score: examResult.score,
        detail: JSON.stringify({
            grade: user.grade, 
            totalCount: examResult.totalCount || allQuestionsData.length,
            correctCount: examResult.correctCount || allQuestionsData.filter(q => q.answer == q.yourAns).length,
            wrongList: examResult.wrongList || [],
            questions: examResult.questions || allQuestionsData || [], 
            cheat: examResult.cheat,
            tabSwitches: examResult.tabSwitches,
            syncTime: new Date().toISOString()
        })
    };

    fetch(GAS_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(recordData) })
    .then(() => {
        hasSaved = true; 
        isSyncing = false; 
        examResult.isSaved = true;
        localStorage.setItem('examResult', JSON.stringify(examResult));
        markButtonAsSaved();
    })
    .catch(err => {
        console.error("同步失敗:", err);
        isSyncing = false; 
        if (btn) {
            btn.disabled = false; 
            btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 重試';
            btn.classList.replace('bg-blue-600', 'bg-red-500');
            btn.classList.remove('opacity-75', 'cursor-not-allowed');
        }
    });
}

function markButtonAsSaved() {
    const btn = document.getElementById('btnSave');
    if (btn) {
        btn.className = "flex items-center gap-2 text-white bg-green-600 font-bold px-3 py-2 rounded-lg cursor-default text-sm";
        btn.innerHTML = '<i class="fas fa-check-circle"></i> 紀錄已送出';
        btn.onclick = null; btn.disabled = true; 
    }
}

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('-translate-x-full');
    overlay.classList.toggle('hidden');
}

function openProfileModal() {
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");
    if (localStorage.getItem(`hasUpdatedGrade_${user.username}`)) return alert("⚠️ 您已經修改過年級，系統限制只能存檔一次！");
    const select = document.getElementById('editGradeSelect');
    if (user.grade) select.value = user.grade;
    document.getElementById('profileModal').classList.remove('hidden');
}

function closeProfileModal() { document.getElementById('profileModal').classList.add('hidden'); }

async function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");
    if (localStorage.getItem(`hasUpdatedGrade_${user.username}`)) return closeProfileModal();

    const saveBtn = document.querySelector('#profileModal button[onclick="saveProfile()"]');
    saveBtn.disabled = true; saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

    try {
        const response = await fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: "update_grade", account: user.username, newGrade: newGrade })
        });
        const result = await response.json();
        if (result.result === "success" || result.status === "success") {
            if (Auth.updateUser) Auth.updateUser('grade', newGrade);
            const roleEl = document.getElementById('sideUserRole');
            if (roleEl) roleEl.innerText = newGrade;
            localStorage.setItem(`hasUpdatedGrade_${user.username}`, 'true');
            alert(`✅ 修改成功！目前年級已更新為：${newGrade}`);
            closeProfileModal();
            const editBtn = document.querySelector('button[onclick="openProfileModal()"]');
            if (editBtn) editBtn.style.display = 'none';
        } else alert("❌ 修改失敗：" + (result.message || "未知錯誤"));
    } catch (error) {
        alert("網路連線異常，請稍後再試。");
    } finally {
        if (saveBtn) { saveBtn.disabled = false; saveBtn.innerText = "確認修改"; }
    }
}
