<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊會員 - 雲端學院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f8; font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen py-8">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-6">
            <div class="w-12 h-12 bg-blue-600 rounded-lg text-white flex items-center justify-center font-bold text-2xl mx-auto mb-4 shadow-lg"><i class="fas fa-user-plus"></i></div>
            <h2 class="text-2xl font-bold text-gray-800">建立新帳號</h2>
            <p class="text-sm text-gray-500 mt-2">請先選擇您的身份</p>
        </div>

        <form id="regForm" class="space-y-5">
            <div class="flex gap-4 mb-4">
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="role" value="student" class="peer sr-only" checked onchange="toggleRoleUI()">
                    <div class="p-3 text-center rounded-xl border-2 border-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 font-bold transition">
                        <i class="fas fa-user-graduate mr-1"></i> 學生
                    </div>
                </label>
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="role" value="parent" class="peer sr-only" onchange="toggleRoleUI()">
                    <div class="p-3 text-center rounded-xl border-2 border-gray-100 peer-checked:border-orange-500 peer-checked:bg-orange-50 peer-checked:text-orange-700 font-bold transition">
                        <i class="fas fa-user-shield mr-1"></i> 家長
                    </div>
                </label>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">真實姓名</label>
                <input type="text" id="name" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 transition" placeholder="請輸入真實姓名" required>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">設定登入帳號</label>
                <input type="text" id="username" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 transition" placeholder="請設定一組英數帳號" required>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">設定密碼</label>
                <input type="password" id="password" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 transition" placeholder="請設定密碼" required>
            </div>

            <div id="studentFields" class="block">
                <label class="block text-sm font-bold text-gray-700 mb-1">目前年級</label>
                <select id="grade" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 transition">
                    <option value="國七">國七</option>
                    <option value="國八">國八</option>
                    <option value="國九">國九</option>
                    <option value="高一">高一</option>
                    <option value="高二">高二</option>
                    <option value="高三">高三</option>
                </select>
            </div>

            <div id="parentFields" class="hidden">
                <label class="block text-sm font-bold text-gray-700 mb-1 text-orange-600"><i class="fas fa-link"></i> 綁定學生帳號</label>
                <input type="text" id="childUsername" class="w-full p-3 bg-orange-50 border border-orange-200 rounded-xl focus:outline-none focus:border-orange-500 transition" placeholder="請輸入您孩子的「登入帳號」">
                <p class="text-xs text-gray-400 mt-1">※ 孩子必須先完成註冊，您才能進行綁定</p>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200 flex justify-center items-center gap-2 mt-4">
                <span>立即註冊</span>
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            <a href="index.html" class="text-gray-500 hover:text-blue-600 font-bold">已有帳號？返回登入</a>
        </div>
    </div>

    

    <script>
        // ⚠️ 請確認這是你最新部署的 Google Apps Script 網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec"; 

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerHTML;

            // 1. 鎖定按鈕與防呆
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 登入驗證中...';
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert("❌ 請輸入帳號與密碼！");
                resetButton(); return;
            }

            const loginData = {
                action: "login",
                username: username,
                password: password
            };

            try {
                // 2. 傳送至後端驗證 (加上解決 CORS 的設定)
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    redirect: "follow",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(loginData)
                });

                const data = await response.json();

                // 3. 登入成功，根據身分自動分流！
                if (data.result === "success") {
                    const user = data.user;
                    
                    // 將基本登入資訊存入瀏覽器
                    localStorage.setItem('username', user.username);
                    localStorage.setItem('name', user.name);
                    localStorage.setItem('role', user.role);

                    // 🌟 智慧身分判斷與跳轉
                    if (user.role === 'parent') {
                        // 因為我們把家長綁定的小孩帳號存在第 4 欄 (GAS 回傳為 grade 屬性)
                        localStorage.setItem('childUsername', user.grade); 
                        alert(`🎉 登入成功！\n歡迎 ${user.name} 家長，將為您導向學習分析儀表板。`);
                        window.location.href = 'parent_dashboard.html'; // 跳轉到家長後台
                    } 
                    else if (user.role === 'teacher') {
                        alert(`🎉 登入成功！\n歡迎 ${user.name} 老師。`);
                        window.location.href = 'teacher_dashboard.html'; // 請改成你實際的教師頁面檔名
                    } 
                    else {
                        // 預設為 student
                        alert(`🎉 登入成功！\n歡迎 ${user.name} 同學。`);
                        window.location.href = 'student_dashboard.html'; // 請改成你實際的學生主頁檔名
                    }
                } else {
                    alert("❌ 登入失敗：" + (data.message || "帳號或密碼錯誤"));
                    resetButton();
                }

            } catch (error) {
                console.error('Fetch Error:', error);
                alert("⚠️ 無法連線至伺服器，請檢查網路狀態或稍後再試。");
                resetButton();
            }

            function resetButton() {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
