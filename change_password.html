<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更改密碼 - 雲端學院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<div id="star-container"></div>
    <div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-xl border border-slate-200">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl shadow-sm">
                <i class="fas fa-key"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800">更改密碼</h2>
            <p class="text-sm font-bold text-slate-500 mt-2" id="userAccountDisplay">載入中...</p>
        </div>

        <form id="changePasswordForm" class="space-y-5">
            
            <div>
                <label class="block text-xs font-black text-slate-500 mb-1 ml-1 tracking-wider">目前密碼</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-400"></i>
                    </div>
                    <input type="password" id="oldPassword" required placeholder="請輸入目前的密碼" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-slate-500 mb-1 ml-1 tracking-wider">新密碼 <span class="text-[10px] text-slate-400 font-normal">(至少 6 個字元)</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-blue-400"></i>
                    </div>
                    <input type="password" id="newPassword" required placeholder="請輸入新密碼" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-slate-500 mb-1 ml-1 tracking-wider">確認新密碼</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-check-circle text-blue-400"></i>
                    </div>
                    <input type="password" id="confirmPassword" required placeholder="請再次輸入新密碼" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <div id="errorMessage" class="hidden bg-red-50 text-red-600 text-xs font-bold p-3 rounded-xl border border-red-100 flex items-center gap-2">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="errorText">錯誤訊息</span>
            </div>

            <div id="successMessage" class="hidden bg-green-50 text-green-600 text-sm font-bold p-4 rounded-xl border border-green-100 text-center flex-col items-center gap-2">
                <i class="fas fa-check-circle text-2xl mb-1"></i>
                <span>密碼修改成功！請重新登入。</span>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 mt-2">
                <i class="fas fa-save"></i> 儲存新密碼
            </button>
            
            <button type="button" onclick="history.back()" id="backBtn" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition-all mt-2 text-sm">
                返回上一頁
            </button>
        </form>
    </div>

    <script>// --- 核心主題引擎 (12 個階級升級版) ---
          // 請替換為您實際的 GAS Web App URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec"; 
const ThemeEngine = {
    apply: async function(username) {
        const body = document.body;
        console.log("🚀 [ThemeEngine] 啟動快照優先模式。用戶:", username);

        // --- 階段 1：立即從本地讀取 ---
        // 抓取整個物件，而不只是 XP，這樣更新時才不會丟失姓名等資料
        let userRaw = localStorage.getItem('currentUser');
        let userDataLocal = userRaw ? JSON.parse(userRaw) : { xp: 0 };
        let currentXP = Number(userDataLocal.xp) || 0;
        
        console.log("📦 [本地快照] 當前 XP:", currentXP);
        this.updateThemeUI(currentXP); 

        // --- 階段 2：背景同步雲端試算表 ---
        try {
            const response = await fetch(`${GAS_URL}?action=get_leaderboard`);
            const leaderboard = await response.json();
            
            const cloudUser = leaderboard.find(u => 
                String(u.username).trim().toLowerCase() === String(username).trim().toLowerCase()
            );

            if (cloudUser) {
                const cloudXP = Number(cloudUser.xp);
                console.log("✅ [雲端回傳] 最新 XP:", cloudXP);

                // ✨ 關鍵判斷：雲端與本地不一致時才更新
                if (cloudXP !== currentXP) {
                    console.log("✨ [同步] 偵測到數值差異，更新本地快照與 UI...");
                    
                    // 1. 更新內存物件中的 XP (保留原本的其他資料)
                    userDataLocal.xp = cloudXP;
                    // 如果雲端有回傳等級也順便更新
                    if (cloudUser.level) userDataLocal.level = cloudUser.level;

                    // 2. 寫回 localStorage
                    localStorage.setItem('currentUser', JSON.stringify(userDataLocal));
                    
                    // 3. 重新觸發染色與特效
                    this.updateThemeUI(cloudXP); 
                }
            } else {
                console.warn("⚠️ 雲端找不到該用戶資料。");
            }
        } catch (e) {
            console.error("❌ 雲端同步失敗:", e);
        }
    },

    updateThemeUI: function(xp) {
        const body = document.body;
        const themes = [
            'theme-novice', 'theme-rookie', 'theme-bronze', 'theme-silver', 
            'theme-gold', 'theme-diamond', 'theme-master', 'theme-grandmaster', 
            'theme-legend', 'theme-epic', 'theme-mythic', 'theme-celestial'
        ];
        body.classList.remove(...themes);

        let selected = 'theme-novice';
        if (xp >= 100000) selected = 'theme-celestial';
        else if (xp >= 50000) selected = 'theme-mythic';
        else if (xp >= 30000) selected = 'theme-epic';
        else if (xp >= 20000) selected = 'theme-legend';
        else if (xp >= 15000) selected = 'theme-grandmaster';
        else if (xp >= 10000) selected = 'theme-master';
        else if (xp >= 5000)  selected = 'theme-diamond';
        else if (xp >= 2500)  selected = 'theme-gold';
        else if (xp >= 1000)  selected = 'theme-silver';
        else if (xp >= 300)   selected = 'theme-bronze';
        else if (xp >= 100)   selected = 'theme-rookie';

        body.classList.add(selected);
        
        // 特效觸發
        if (xp >= 50000) {
            this.createStars(xp >= 100000 ? 15 : 8);
        }
    },

    createStars: function(starCount) {
        let container = document.getElementById('star-container');
        if (!container) {
            container = document.createElement('div');
            container.id = 'star-container';
            document.body.appendChild(container);
        }
        container.innerHTML = ''; 
        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; 
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};
// --- 自動執行 ---
document.addEventListener('DOMContentLoaded', () => {
    // 讀取 currentUser，如果沒有就預設 0
    const user = JSON.parse(localStorage.getItem('currentUser') || '{"xp":0}');
    ThemeEngine.apply(user.xp);
});


      
        // 1. 頁面載入時，確認使用者是否已登入
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                alert("請先登入！");
                window.location.href = "index.html"; // 導回登入頁
                return;
            }
            // 顯示目前使用者的帳號或名稱
            document.getElementById('userAccountDisplay').textContent = `帳號：${currentUser.account || currentUser.username}`;
        });

        // 2. 表單送出事件處理
        document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // 防止網頁重新整理
            
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successMessage = document.getElementById('successMessage');
            const backBtn = document.getElementById('backBtn');

            // 隱藏之前的訊息
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');

            // --- 前端防呆驗證 ---
            if (newPassword.length < 6) {
                showError("新密碼長度必須至少 6 個字元！");
                return;
            }
            if (newPassword !== confirmPassword) {
                showError("兩次輸入的新密碼不一致！");
                return;
            }
            if (oldPassword === newPassword) {
                showError("新密碼不能與舊密碼相同！");
                return;
            }

            // --- 準備發送 API 請求 ---
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 處理中...';
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                // 發送 POST 請求給 GAS
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "change_password",
                        account: currentUser.account || currentUser.username, // 傳送帳號
                        oldPassword: oldPassword,
                        newPassword: newPassword
                    })
                });

                const result = await response.json();

                if (result.status === "success" || result.result === "success") {
                    // 修改成功 UI 變化
                    document.getElementById('oldPassword').disabled = true;
                    document.getElementById('newPassword').disabled = true;
                    document.getElementById('confirmPassword').disabled = true;
                    submitBtn.classList.add('hidden');
                    backBtn.classList.add('hidden');
                    successMessage.classList.remove('hidden', 'flex-col');
                    successMessage.classList.add('flex', 'flex-col');
                    
                    // 清除登入狀態，要求重新登入
                    localStorage.removeItem('currentUser');
                    
                    // 3 秒後自動導向登入頁
                    setTimeout(() => {
                        window.location.href = "index.html"; 
                    }, 3000);
                } else {
                    // 伺服器回報錯誤 (例如：舊密碼輸入錯誤)
                    showError(result.message || "修改失敗，請確認舊密碼是否正確。");
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                showError("網路連線異常，請稍後再試。");
            } finally {
                // 恢復按鈕狀態
                if(!successMessage.classList.contains('flex')) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-save"></i> 儲存新密碼';
                    submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                }
            }
        });

        // 顯示錯誤訊息的小工具函數
        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMessage').classList.remove('hidden');
        }
    </script>
</body>
</html>
